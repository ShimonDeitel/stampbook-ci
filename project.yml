name: Stampbook
options:
  bundleIdPrefix: com.shimondeitel.stampbook
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Stampbook:
    type: application
    platform: iOS
    sources:
      - path: Stampbook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.stampbook
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Stampbook/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  StampbookTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StampbookTests
      - path: Stampbook.storekit
    dependencies:
      - target: Stampbook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.stampbook.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  StampbookUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: StampbookUITests
    dependencies:
      - target: Stampbook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.stampbook.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Stampbook:
    build:
      targets:
        Stampbook: all
        StampbookTests: [test]
        StampbookUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Stampbook.storekit
    test:
      config: Debug
      storeKitConfiguration: Stampbook.storekit
      targets:
        - StampbookTests
        - StampbookUITests
    archive:
      config: Release
